name: Bug Report
description: Report a bug in Trysil
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create an entity with ...
        2. Call LContext.Select<T>(...)
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or stack traces if available.
    validations:
      required: true

  - type: dropdown
    id: delphi-version
    attributes:
      label: Delphi version
      options:
        - Delphi 10.3 Rio
        - Delphi 10.4 Sydney
        - Delphi 11 Alexandria
        - Delphi 12 Athens
        - Delphi 13 Florence
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite
        - PostgreSQL
        - SQL Server
        - Firebird
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code example
      description: Minimal code that reproduces the issue (optional).
      render: pascal
